CONFIG_PM=y
CONFIG_PM_DEVICE=n
CONFIG_LOG=n
CONFIG_ASSERT=n
CONFIG_USE_SEGGER_RTT=n
CONFIG_IDLE_STACK_SIZE=128
CONFIG_ISR_STACK_SIZE=512
CONFIG_WATCHDOG=y

# ---- FAILSAFES: catch stack overflow / bad memory access cleanly (MPU guard +
# stack canary). Any fatal fault is turned into a reboot by k_sys_fatal_error_handler
# in main.c, and the 4 s watchdog is the final backstop for a hang. ----
CONFIG_HW_STACK_PROTECTION=y
CONFIG_STACK_SENTINEL=y
CONFIG_REBOOT=y
CONFIG_CLOCK_CONTROL=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_SYNTH=y

# ---- USB-serial diagnostics console (CDC ACM) ----
CONFIG_PRINTK=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# ---- Milestone 3: USB-C audio IN (UAC2) on the new device_next USB stack ----
# UAC2 only exists on the new stack, which is mutually exclusive with the legacy
# CONFIG_USB_DEVICE_STACK. The CDC console therefore moves to device_next too and
# enumerates as a composite (UAC2 speaker + CDC ACM) device.
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_AUDIO2_CLASS=y
CONFIG_USBD_CDC_ACM_CLASS=y
# SOF events drive the explicit-feedback regulator (sof_cb / feedback_cb).
CONFIG_UDC_ENABLE_SOF=y
# The app owns the single composite USBD context; do NOT let the CDC SYS_INIT
# build a second private context that would fight for the controller.
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n
# Serial-number string descriptor.
CONFIG_HWINFO=y
# Composite device identity (replaces the legacy VID/PID/strings). New PID so a
# host does not reuse a cached CDC-only driver from the old firmware.
CONFIG_SAMPLE_USBD_VID=0x1915
CONFIG_SAMPLE_USBD_PID=0x5210
CONFIG_SAMPLE_USBD_MANUFACTURER="softmodded"
CONFIG_SAMPLE_USBD_PRODUCT="SP-1 Audio"
# WINDOWS: usbaudio2.sys demands a 4-byte Full-Speed feedback endpoint (the
# USB spec says 3) and a Q16.16 value — without this the device enumerates
# with a yellow triangle / Code 10 ("cannot start") on Windows. Linux and
# macOS parse the format from the declared size, so this is host-universal.
# (Backported into the Zephyr tree; upstream: USBD_UAC2_FS_WINDOWS_WORKAROUND,
# zephyrproject-rtos/zephyr issue #77212.)
CONFIG_USBD_UAC2_FS_WINDOWS_WORKAROUND=y
# iOS: iPhones/iPads reject accessories claiming more than 100 mA over the
# camera adapter. The SP-1 runs from its own battery and barely sips the bus,
# so claim 100 mA (units of 2 mA) instead of the 250 mA default.
CONFIG_SAMPLE_USBD_MAX_POWER=50

# ---- ADC for the button ladders / faders ----
CONFIG_ADC=y

# ---- Milestone 2: I2C to the audio codecs (CS42L42 / TAS2505) ----
CONFIG_I2C=y

# ---- Milestone 2b: I2S audio out (nRF master) ----
CONFIG_I2S=y
CONFIG_I2S_NRFX=y
CONFIG_FPU=y
# NOTE: deliberately NOT setting CONFIG_SPEED_OPTIMIZATIONS=y (-O2). It crashed the
# device on hardware -- this ae5b2e8-derived code has latent signed-overflow UB in
# the mixer interp that -O2 weaponizes. Default -Os is stable. Re-enabling -O2 would
# require fixing that UB (int64 interp) FIRST. Stay on -Os.

# USB stack + printf need a roomier main stack than the bare power build;
# device_next USBD init (descriptor build + class registration) wants headroom.
CONFIG_MAIN_STACK_SIZE=4096
